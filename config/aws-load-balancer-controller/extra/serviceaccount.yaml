apiVersion: v1
kind: ServiceAccount
metadata:
  name: aws-load-balancer-controller
  namespace: kube-system
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::{{account_id}}:role/{{cluster_name}}-aws-load-balancer-controller"
automountServiceAccountToken: true
