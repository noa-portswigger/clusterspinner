# these values are borrowed from https://karpenter.sh/docs/getting-started/getting-started-with-karpenter/
# with the requests and limits pushed down since we work with very small nodes
settings:
  clusterName: {{cluster_name}}
  interruptionQueue: {{cluster_name}}

controller:
  env:
    - name: AWS_REGION
      value: {{aws_region}}
  resources:
    requests:
      cpu: 250m
      memory: 250Mi
    limits:
      cpu: 500m
      memory: 500Mi

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{account_id}}:role/{{cluster_name}}-karpenter
