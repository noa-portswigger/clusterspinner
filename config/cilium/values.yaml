eni:
  enabled: true
  nodeSpec:
    subnetTags:
      - karpenter.sh/discovery={{cluster_name}}
hubble:
  tls:
    auto:
      method: certmanager
      certManagerIssuerRef:
        name: aws-load-balancer-root-issuer
  relay:
    enabled: true
  ui:
    enabled: true
    service:
      annotations:
        noa.re/discover: enabled
