apiVersion: cert-manager.io/v1                                                                                                                                                   
kind: Certificate                                                                                                                                                                
metadata:                                                                                                                                                                        
  name: ca
spec:
  duration: 175200h # 20 years 
  isCA: true
  issuerRef:
    name: ca
  privateKey:
    algorithm: ECDSA
    rotationPolicy: Always
  secretName: ca-tls
  commonName: ca-cert
